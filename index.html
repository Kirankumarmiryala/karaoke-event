<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Karaoke Night</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
padding:0;
background:linear-gradient(135deg,#ff9a3c,#ff7a18,#ffb347,#ffd27f);
background-size:300% 300%;
animation:bg 10s infinite alternate;
text-align:center;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* floating music icons */

.music{
position:fixed;
font-size:30px;
animation:float 6s infinite linear;
opacity:0.35;
}

.music1{left:10%;top:20%;}
.music2{right:10%;top:30%;}
.music3{left:20%;bottom:20%;}
.music4{right:20%;bottom:25%;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0);}
}

/* main card */

.container{
max-width:520px;
margin:auto;
margin-top:80px;
background:linear-gradient(180deg,#ffffff,#eaf6ff);
padding:40px;
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
}

/* animated mic */

.mic{
font-size:50px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.award{
width:120px;
margin-bottom:10px;
}

.highlight{
color:#5b6cff;
font-weight:600;
font-size:20px;
}

.event{
font-size:26px;
font-weight:700;
margin-top:10px;
}

.button{
display:inline-block;
margin-top:25px;
padding:16px 35px;
font-size:18px;
color:white;
background:linear-gradient(45deg,#5b6cff,#8f94fb);
border-radius:10px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.button:hover{
transform:scale(1.05);
}

.countdown{
margin-top:20px;
font-size:20px;
font-weight:600;
color:#444;
}

</style>
</head>

<body>

<div class="music music1">🎵</div>
<div class="music music2">🎶</div>
<div class="music music3">🎵</div>
<div class="music music4">🎶</div>

<div class="container">

<!-- AWARD IMAGE -->
<img src="https://i.postimg.cc/QtNH8XJd/photo-2026-03-13-11-56-19.jpg" class="award">

<div class="mic">🎤</div>

<p>
If this little award made you smile for a moment,
</p>

<p class="highlight">
Imagine 3 hours of music, laughter and good vibes
</p>

<div class="event">
Join us at our Live Karaoke Night
</div>

<p>🕖 Sunday | 7 PM</p>

<a class="button" href="https://sklbx.com/nqSrf3Me">
Book My Seat
</a>

<p>Entry Pass ₹299</p>
<p>⚡ Only 40 seats available</p>

<div class="countdown">
⏳ Event starts in: <span id="timer"></span>
</div>

</div>

<script>

var eventDate = new Date("March 15, 2026 19:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = eventDate - now;

var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
var seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("timer").innerHTML =
days+"d "+hours+"h "+minutes+"m "+seconds+"s ";

},1000);

</script>

</body>
</html>
